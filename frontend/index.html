<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Receptionist | Premium SaaS</title>
    <meta name="description" content="A scalable, production-ready AI Voice Receptionist for businesses.">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="app">
        <div class="glass-card">
            <header>
                <h1>Nova Voice</h1>
                <p class="subtitle">AI Receptionist for Modern Businesses</p>
            </header>

            <div class="interaction-zone">
                <button id="recordBtn" class="record-btn" title="Start Recording">
                    <svg viewBox="0 0 24 24" id="micIcon">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <p id="statusLabel" class="status-msg">Click to speak to Nova</p>

                <div class="display-area">
                    <div id="transcriptContainer" style="display: none;">
                        <span class="label">You said:</span>
                        <div id="transcriptText" class="chat-bubble transcript-box"></div>
                    </div>

                    <div id="responseContainer" style="display: none;">
                        <span class="label">Nova:</span>
                        <div id="responseText" class="chat-bubble response-box" style="display: block;"></div>
                        <button id="sourcesToggle" class="sources-toggle">Show Sources</button>
                        <div id="sourcesList" class="sources-list"></div>
                    </div>
                </div>
                
                <audio id="audioPlayer" controls style="display: none;"></audio>
            </div>

            <section class="upload-section">
                <span class="label">Knowledge Ingestion (Admin)</span>
                <div class="file-input-wrapper">
                    <input type="file" id="knowledgeUpload" accept=".pdf,.txt,.docx">
                    <button id="uploadBtn" class="record-btn" style="width: auto; height: auto; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem;">Upload</button>
                </div>
                <div id="uploadStatus" class="status-msg"></div>
            </section>
        </div>
    </div>

    <script src="src/js/app.js"></script>
</body>
</html>
